<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>End</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Raleway:wght@300;400;600&family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a0608;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Cormorant Garamond', serif;
        }

        /* ---- звёзды ---- */
        #stars-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* ---- падающие осколки сердца ---- */
        #particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }
        .shard {
            position: absolute;
            top: -20px;
            font-size: 14px;
            animation: fall linear forwards;
            opacity: 0;
            filter: grayscale(1) brightness(0.6);
            user-select: none;
        }
        @keyframes fall {
            0%   { transform: translateY(0) rotate(0deg);   opacity: 0.7; }
            80%  { opacity: 0.4; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* ---- центральный блок ---- */
        .end-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            text-align: center;
            padding: 0 24px;
        }

        /* broken heart */
        .broken-heart {
            font-size: clamp(48px, 10vw, 80px);
            animation: heartbeat-break 3s ease-in-out infinite;
            filter: drop-shadow(0 0 18px #ff6b8a88);
            user-select: none;
        }
        @keyframes heartbeat-break {
            0%, 100% { transform: scale(1);   filter: drop-shadow(0 0 18px #ff6b8a88); }
            30%       { transform: scale(1.07); filter: drop-shadow(0 0 28px #ff6b8acc); }
            50%       { transform: scale(0.97); }
        }

        /* SVG-надпись The End */
        .writing-svg {
            width: min(520px, 95vw);
            overflow: visible;
        }
        #end-text {
            stroke-dasharray: 1200;
            stroke-dashoffset: 1200;
            animation: draw-text 2.8s ease forwards 0.6s;
        }
        @keyframes draw-text {
            to { stroke-dashoffset: 0; }
        }
        /* после прорисовки — мягкое свечение */
        #end-text {
            animation: draw-text 2.8s ease forwards 0.6s, glow-text 3s ease-in-out 3.4s infinite;
        }
        @keyframes glow-text {
            0%, 100% { filter: drop-shadow(0 0 4px #ff6b8a88); }
            50%       { filter: drop-shadow(0 0 16px #ff6b8acc) drop-shadow(0 0 30px #d63c5e44); }
        }

        /* подпись под надписью */
        .end-sub {
            font-family: 'Raleway', sans-serif;
            font-weight: 300;
            font-size: clamp(13px, 3vw, 17px);
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: #9a6070;
            opacity: 0;
            animation: fade-up 1.2s ease forwards 3.6s;
        }
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* горизонтальная линия-дивайдер */
        .divider {
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ff6b8a88, transparent);
            animation: expand-line 1.4s ease forwards 3.2s;
        }
        @keyframes expand-line {
            to { width: min(280px, 70vw); }
        }

        /* дата — зачёркнута */
        .end-date {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(14px, 3.5vw, 18px);
            color: #5a3545;
            opacity: 0;
            position: relative;
            animation: fade-up 1s ease forwards 4.4s;
        }
        .end-date::after {
            content: '';
            position: absolute;
            left: 0; right: 0;
            top: 50%;
            height: 1px;
            background: #9a6070;
            transform: scaleX(0);
            transform-origin: left;
            animation: strikethrough 0.8s ease forwards 5.2s;
        }
        @keyframes strikethrough {
            to { transform: scaleX(1); }
        }
    </style>
</head>
<body>

    <canvas id="stars-canvas"></canvas>
    <div id="particles"></div>

    <div class="end-wrapper">
        <div class="broken-heart">💔</div>

        <svg class="writing-svg" viewBox="0 0 520 110" xmlns="http://www.w3.org/2000/svg">
            <text x="50%" y="82" text-anchor="middle"
                  font-family="'Cormorant Garamond', serif"
                  font-size="88"
                  font-style="italic"
                  fill="none"
                  stroke="#ff6b8a"
                  stroke-width="1.2"
                  id="end-text">The End</text>
        </svg>

        <div class="divider"></div>
        <div class="end-sub">03.08.2025 — 27.05.2026</div>
        <div class="end-date">Андрей & Карина</div>
    </div>

    <script>
        /* ---- звёздный фон ---- */
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        let W, H, stars = [];

        function initStars() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
            stars = Array.from({ length: 220 }, () => ({
                x: Math.random() * W,
                y: Math.random() * H,
                r: Math.random() * 1.4 + 0.3,
                a: Math.random(),
                da: (Math.random() * 0.006 + 0.002) * (Math.random() < 0.5 ? 1 : -1)
            }));
        }

        function drawStars() {
            ctx.clearRect(0, 0, W, H);
            stars.forEach(s => {
                s.a += s.da;
                if (s.a > 1 || s.a < 0) s.da *= -1;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 200, 210, ${s.a})`;
                ctx.fill();
            });
            requestAnimationFrame(drawStars);
        }

        window.addEventListener('resize', initStars);
        initStars();
        drawStars();

        /* ---- падающие осколки ---- */
        const particles = document.getElementById('particles');
        const shardSymbols = ['💔', '·', '·', '·', '✦', '·', '∘', '·'];

        function createShard() {
            const el = document.createElement('div');
            el.classList.add('shard');
            el.textContent = shardSymbols[Math.floor(Math.random() * shardSymbols.length)];
            el.style.left = Math.random() * 100 + 'vw';
            const dur = Math.random() * 8 + 6;
            el.style.animationDuration = dur + 's';
            el.style.fontSize = (Math.random() * 14 + 8) + 'px';
            el.style.animationDelay = (Math.random() * 2) + 's';
            particles.appendChild(el);
            setTimeout(() => el.remove(), (dur + 2) * 1000);
        }

        setInterval(createShard, 700);
        for (let i = 0; i < 8; i++) setTimeout(createShard, i * 200);
    </script>
</body>
</html>
