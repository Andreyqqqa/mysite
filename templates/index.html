<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Привет Любимая</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Raleway:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0005;
      color: #eee;
      font-family: 'Raleway', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle static grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* Soft static glow in corners */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 20%, rgba(255,107,138,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 85% 80%, rgba(100,0,40,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 600px;
      width: 90vw;
      padding: 64px 60px 56px;
      background: rgba(13, 0, 8, 0.7);
      border: 1px solid rgba(255, 107, 138, 0.35);
      border-radius: 12px;
      box-shadow:
        0 0 60px rgba(255, 107, 138, 0.12),
        0 0 120px rgba(255, 107, 138, 0.05),
        inset 0 0 40px rgba(255, 107, 138, 0.03);
      backdrop-filter: blur(20px);
      animation: fadeUp 1s cubic-bezier(.22,1,.36,1) both;
    }

    /* Inner border detail */
    .card::before {
      content: '';
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(255, 107, 138, 0.12);
      border-radius: 6px;
      pointer-events: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .pre-label {
      font-family: 'Raleway', sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 28px;
      animation: fadeUp 1s .15s both;
    }

    .main-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 400;
      color: #fff;
      line-height: 1.25;
      margin-bottom: 10px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
      animation: fadeUp 1s .25s both;
    }

    .main-text span {
      color: #ff6b8a;
      font-style: italic;
    }

    .sub-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      font-weight: 400;
      font-style: italic;
      color: #ff6b8a;
      margin-bottom: 36px;
      animation: fadeUp 1s .35s both;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #ff6b8a, transparent);
      margin: 0 auto 36px;
      animation: fadeUp 1s .45s both;
    }

    @media (max-width: 480px) {
      .card { padding: 48px 28px 44px; }
    }
  </style>
</head>
<body>

  <div class="card">
    <p class="pre-label">сообщение для тебя</p>
    <h1 class="main-text">Привет, <span>Любимая!</span></h1>
    <p class="sub-text">Скинь сисечки! ?</p>
    <div class="divider"></div>
  </div>

</body>
</html>
